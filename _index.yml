indexpage:
  title: Documentación de Astra Control Center 24,02
  summary: El software Astra Control Center proporciona la gestión de datos para aplicaciones
    de los clústeres de Kubernetes en tu entorno on-premises. Realice backups fácilmente
    de aplicaciones de Kubernetes, migre datos a un clúster diferente y cree, de forma
    instantánea, clones de aplicaciones de trabajo. Si necesita gestionar aplicaciones
    de Kubernetes que se ejecutan en un cloud público, diríjase a los documentos de
    Astra Control Service.
  keywords: astra control center, kubernetes data management, backup kubernetes apps,
    migrate kubernetes data, on-premises kubernetes management
  lead: El software Astra Control Center proporciona la gestión de datos para aplicaciones
    de los clústeres de Kubernetes en tu entorno on-premises. Realice backups fácilmente
